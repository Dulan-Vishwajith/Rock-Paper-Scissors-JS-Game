<!DOCTYPE html>
<html>

<head>
    <title>Booleans</title>
    <style>

    </style>
</head>

<body>
    <p>Rock Paper Scissors</p>

    <button class="btn" onclick="playGame('Rock')">Rock</button>
    <button class="btn" onclick="playGame('Paper')">Paper</button>
    <button class="btn" onclick="playGame('Scissors')">Scissors</button>


    <p><a>Click here</a>to see final version of the project</p>

    <script>
        function playGame(playerMove) {

            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';

            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';

            } else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
                computerMove = 'Scissors';
            }

            let result = '';

            if (playerMove === computerMove) {
                result = 'Tie';
            } else if (
                (playerMove === 'Rock' && computerMove === 'Scissors') ||
                (playerMove === 'Scissors' && computerMove === 'Paper') ||
                (playerMove === 'Paper' && computerMove === 'Rock')
            ) {
                result = 'You Win';
            } else {
                result = 'You Lose';
            }

            alert(`You picked ${playerMove}, Computer picked ${computerMove}, ${result}`);
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Booleans</title>
    <style>

    </style>
</head>

<body>
    <p>Rock Paper Scissors</p>

    <button class="btn" onclick="playGame('Rock')">Rock</button>
    <button class="btn" onclick="playGame('Paper')">Paper</button>
    <button class="btn" onclick="playGame('Scissors')">Scissors</button>
    <button class="btn" onclick="resetScore()">Reset Score</button>

    <p><a>Click here</a>to see final version of the project</p>

    <script>
        let score = JSON.parse(localStorage.getItem('score'))//using JSON method by converting string to object and get it 
                    || {                //default operators instead using below if clauses
                        losses: 0,
                        wins: 0,
                        ties:0
                    };


        /*
        //after loading if null the object assign default values for it.
        if(!score){
            score ={
                losses: 0,
                wins: 0,
                ties: 0
                
            };
        }
        */
        
        function playGame(playerMove) {

            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber < 1 / 3) {
                computerMove = 'Rock';

            } else if (randomNumber < 2 / 3) {
                computerMove = 'Paper';

            } else{
                computerMove = 'Scissors';
            }

            let result = '';

            if (playerMove === computerMove) {
                result = 'Tie';
                score.ties++;
            } else if (
                (playerMove === 'Rock' && computerMove === 'Scissors') ||
                (playerMove === 'Scissors' && computerMove === 'Paper') ||
                (playerMove === 'Paper' && computerMove === 'Rock')
            ) {
                result = 'You Win';
                score.wins++;
            } else {
                result = 'You Lose';
                score.losses++;
            }


            localStorage.setItem('score',JSON.stringify(score));//save score by loacalStorage using JSON method by converting to string

            alert(`You picked ${playerMove}, Computer picked ${computerMove}, ${result} \nWins ${score.wins}, Losses ${score.losses}, Ties ${score.ties}`);
        }

        function resetScore(){
            score.losses = 0;
            score.wins = 0; 
            score.ties = 0;
            localStorage.removeItem('score');// to remove score item from loacl storage this can null the object when loading
        }

    </script>
</body>

</html>
